name: Build packages

# Bouwt bij elke push naar main (en op PR's + handmatig) de web-app en de drie
# platform-pakketten, en publiceert ze als downloadbare artifacts.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  web:
    name: Web-build (modern + ES5-legacy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          retention-days: 14

  tizen:
    name: Tizen .wgt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run package:tizen
      - uses: actions/upload-artifact@v4
        with:
          name: tizen-wgt
          path: build/*.wgt
          retention-days: 14

  webos:
    name: webOS .ipk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run package:webos
      - uses: actions/upload-artifact@v4
        with:
          name: webos-ipk
          path: build/*.ipk
          retention-days: 14

  android:
    name: Android TV APK (debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: android-actions/setup-android@v3
      - run: npm ci
      # Bouwt de web-app en kopieert die naar de Capacitor-schil (android/).
      - run: npm run android:sync
      - name: Gradle assembleDebug
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
        working-directory: android
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
